<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" type="text/css" />
    <title>Home Page</title>
  </head>
  <body>
    <h1>Hi student, Welcome to XYZ University!</h1>
    <p>
      You can sign up to the platform to access all important notes & lectures.
    </p>

    <form method="POST" id="signupForm">
      <div class="field">
        <label for="email">Email: </label>
        <input type="text" placeholder="jane@email.com" name="email" />
      </div>
      <div class="field">
        <label for="username">Username: </label>
        <input type="text" placeholder="Jane Doe" name="username" />
      </div>
      <div class="field">
        <label for="password">Password: </label>
        <input type="password" placeholder="password" name="password" />
      </div>

      <button id="formBtn">Create Account</button>
    </form>
    <div class="user-info">
        <table>
            <thead>
                <tr>
                <th>Email</th>
                <th>Username</th>
                <th>Password</th>
                </tr>
            </thead>
            <tbody id="usersTableBody">
                <!-- User data will be populated here -->
            </tbody>
        </table>
    </div>
  </body>
  <script>
    // Handle form submission
    document.getElementById("signupForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const formData = new FormData(event.target);
      const userObj = Object.fromEntries(formData.entries());

      try {
        const response = await fetch("/addUser", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(userObj),
        });

        if (response.ok) {
          alert("User added successfully!");
          event.target.reset();
        } else {
          alert("Error adding user");
        }
      } catch (error) {
        console.error("Error:", error);
        alert("Error adding user");
      }
    });
    // Fetch users when the page loads
    document.addEventListener("DOMContentLoaded", async () => {
      try {
        const response = await fetch("/getUsers");
        const users = await response.json();
        const tableBody = document.getElementById("usersTableBody");

        users.forEach((user) => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${user.email}</td>
            <td>${user.username}</td>
            <td>${user.password}</td>
          `;
          tableBody.appendChild(row);
        });
      } catch (error) {
        console.error("Error fetching users:", error);
      }
    });
  </script>
</html>
